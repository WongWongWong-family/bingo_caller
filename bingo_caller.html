<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bingo Caller</title>
<style>
:root{
  --bg:#f7f7f4; --card:#ffffff; --text:#1f2937; --muted:#6b7280; --border:#d1d5db; --button:#111827; --buttonText:#fff; --accent:#f59e0b;
}
body.dark{
  --bg:#111827; --card:#1f2937; --text:#f9fafb; --muted:#cbd5e1; --border:#374151; --button:#f9fafb; --buttonText:#111827; --accent:#fbbf24;
}
*{box-sizing:border-box}
body{
  margin:0; font-family:Arial,"Noto Sans TC",sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:22px;
}
.app{width:min(1000px,100%)}
.panel{background:var(--card); border:2px solid var(--border); border-radius:24px; padding:24px; box-shadow:0 12px 35px rgba(0,0,0,.12)}
h1{text-align:center; margin:0 0 12px; font-size:38px; letter-spacing:2px}
.controls{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin:14px 0}
button{
  border:0; border-radius:999px; padding:12px 22px; font-size:17px; cursor:pointer; background:var(--button); color:var(--buttonText); font-weight:700;
}
button.secondary{background:transparent; color:var(--text); border:2px solid var(--border)}
button.accent{background:var(--accent); color:#111827}
textarea{
  width:100%; height:150px; border:2px solid var(--border); border-radius:14px; padding:12px; font-size:16px;
  background:var(--bg); color:var(--text); resize:vertical;
}
.wordBox{
  margin:22px auto; min-height:210px; display:flex; align-items:center; justify-content:center; text-align:center;
  border:4px dashed var(--border); border-radius:24px; padding:20px;
}
#currentWord{font-size:clamp(52px,10vw,110px); font-weight:900; line-height:1.05; word-break:break-word}
.status{text-align:center; color:var(--muted); font-size:20px; margin-top:6px}
.history{margin-top:18px; border-top:2px solid var(--border); padding-top:16px}
.history h2{font-size:20px; margin:0 0 10px}
#calledList{display:flex; flex-wrap:wrap; gap:8px}
.badge{border:1px solid var(--border); border-radius:999px; padding:7px 12px; color:var(--muted); background:var(--bg); font-size:15px}
.small{text-align:center; color:var(--muted); font-size:14px; margin-top:10px}
.fullscreen .panel{min-height:92vh; display:flex; flex-direction:column; justify-content:center}
.fullscreen textarea,.fullscreen .inputTitle{display:none}
@media print{.controls,textarea,.inputTitle,.small{display:none} body{padding:0}.panel{box-shadow:none;border:0}}
</style>
</head>
<body>
<div class="app">
  <div class="panel">
    <h1>BINGO CALLER</h1>
    <div class="controls">
      <button class="accent" onclick="startRoll()">Start</button>
      <button onclick="stopRoll()">Stop 🔔</button>
      <button class="secondary" onclick="drawOne()">Draw One</button>
      <button class="secondary" onclick="resetGame()">Reset</button>
      <button class="secondary" onclick="toggleTheme()">Light / Dark</button>
      <button class="secondary" onclick="toggleFullscreen()">Fullscreen</button>
    </div>

    <div class="wordBox"><div id="currentWord">Ready?</div></div>
    <div class="status" id="status">已抽：0 / 0</div>

    <div class="inputTitle"><b>字詞名單：</b>每行一個字，Copy Bingo 內容過嚟就可以。</div>
    <textarea id="wordInput">Lion
Tiger
Elephant
Giraffe
Zebra
Panda
Monkey
Hippo
Rhino
Penguin
Dolphin
Rabbit
Dog
Cat
Fox
Squirrel</textarea>

    <div class="history">
      <h2>已抽過：</h2>
      <div id="calledList"></div>
    </div>
    <div class="small">第一次播放叮聲時，瀏覽器可能需要你先按一下畫面或按 Start。</div>
  </div>
</div>

<script>
let words = [];
let remaining = [];
let called = [];
let rollingTimer = null;
let audioCtx = null;

function loadWords(){
  words = document.getElementById('wordInput').value.split('\n').map(x=>x.trim()).filter(Boolean);
  if(words.length===0){ alert('請先輸入字詞'); return false; }
  if(remaining.length===0 && called.length===0) remaining = [...words];
  updateStatus();
  return true;
}

function randomFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function startRoll(){
  if(!loadWords()) return;
  if(remaining.length===0){ alert('已經全部抽完，請按 Reset。'); return; }
  if(rollingTimer) return;
  rollingTimer = setInterval(()=>{
    document.getElementById('currentWord').textContent = randomFrom(remaining);
  },80);
}

function stopRoll(){
  if(rollingTimer){ clearInterval(rollingTimer); rollingTimer=null; }
  drawOne(true);
}

function drawOne(withSound=false){
  if(!loadWords()) return;
  if(remaining.length===0){
    document.getElementById('currentWord').textContent = 'Finished!';
    updateStatus();
    return;
  }
  const index = Math.floor(Math.random()*remaining.length);
  const word = remaining.splice(index,1)[0];
  called.push(word);
  document.getElementById('currentWord').textContent = word;
  updateStatus();
  renderCalled();
  if(withSound) ding();
}

function resetGame(){
  if(rollingTimer){ clearInterval(rollingTimer); rollingTimer=null; }
  words = document.getElementById('wordInput').value.split('\n').map(x=>x.trim()).filter(Boolean);
  remaining = [...words]; called = [];
  document.getElementById('currentWord').textContent = 'Ready?';
  renderCalled(); updateStatus();
}

function updateStatus(){
  const total = remaining.length + called.length;
  document.getElementById('status').textContent = `已抽：${called.length} / ${total}`;
}

function renderCalled(){
  const box = document.getElementById('calledList');
  box.innerHTML = '';
  called.forEach(w=>{
    const span = document.createElement('span');
    span.className = 'badge';
    span.textContent = w;
    box.appendChild(span);
  });
}

function toggleTheme(){ document.body.classList.toggle('dark'); }
function toggleFullscreen(){
  document.body.classList.toggle('fullscreen');
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.(); }
  else{ document.exitFullscreen?.(); }
}

function ding(){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.setValueAtTime(1320, now + 0.08);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.35, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.3);
  }catch(e){ console.log(e); }
}

resetGame();
</script>
</body>
</html>
